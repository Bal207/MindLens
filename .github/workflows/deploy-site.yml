name: Deploy landing site

# Builds the Doxygen-generated landing page and publishes it to GitHub Pages,
# so the site is just a link: https://<owner>.github.io/<repo>/

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen + Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Point download buttons at this repo
        run: sed -i "s#Bal207/MindLens#${GITHUB_REPOSITORY}#g; s#YOUR_GITHUB_USERNAME/MindLens#${GITHUB_REPOSITORY}#g" docs/landing.js

      - name: Build site with Doxygen
        run: cd docs && doxygen Doxyfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
