name: Deploy site & app

# Builds the Doxygen landing page AND bundles the in-browser MindLens app, then
# publishes both to GitHub Pages:
#   landing page -> https://<owner>.github.io/<repo>/
#   the app      -> https://<owner>.github.io/<repo>/app/

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'website/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Doxygen + Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Build site with Doxygen
        run: cd docs && doxygen Doxyfile

      - name: Bundle the in-browser app at /app
        run: |
          mkdir -p docs/html/app
          cp -R website/. docs/html/app/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
